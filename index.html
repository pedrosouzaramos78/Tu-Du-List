<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow • Lista de Tarefas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-950 min-h-screen font-sans text-slate-200">
    <div class="max-w-3xl mx-auto px-4 py-10">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-violet-600 rounded-2xl flex items-center justify-center">
                    <span class="text-2xl font-bold text-white">ƒ</span>
                </div>
                <div>
                    <h1 class="text-4xl font-semibold tracking-tight">Flow</h1>
                    <p class="text-slate-400 -mt-1">suas tarefas, com estilo</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-3">
                <div id="stats" class="flex items-center bg-white/10 rounded-3xl px-5 py-2 text-sm font-medium glass">
                    <span id="pending-count" class="flex items-center gap-x-1.5">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
                        </span>
                        <span id="pending-number">0</span> pendentes
                    </span>
                </div>
                
                <div onclick="clearAllCompleted()" class="w-10 h-10 flex items-center justify-center bg-white/10 hover:bg-white/20 rounded-2xl cursor-pointer">
                    🗑️
                </div>
                
                <div class="flex items-center gap-x-1 bg-white/10 px-4 py-2 rounded-3xl text-xs font-medium">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    AO VIVO
                </div>
            </div>
        </div>

        <!-- Add Task Bar -->
        <div class="glass border border-white/10 rounded-3xl p-2 mb-8 shadow-2xl">
            <form id="add-form" class="flex items-center gap-3">
                <div class="flex-1">
                    <input 
                        id="task-input"
                        type="text" 
                        placeholder="O que precisa ser feito hoje?"
                        class="w-full bg-transparent border-0 px-6 py-5 text-lg placeholder:text-slate-400 focus:outline-none">
                </div>
                
                <div class="flex items-center gap-2" id="priority-pills">
                    <!-- Preenchido pelo JS -->
                </div>
                
                <button 
                    type="submit"
                    class="bg-violet-600 hover:bg-violet-700 text-white font-semibold px-8 py-5 rounded-3xl flex items-center gap-x-2 shadow-lg shadow-violet-500/40">
                    <span class="text-xl leading-none">+</span>
                    <span>Adicionar</span>
                </button>
            </form>
        </div>

        <!-- Filters -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex gap-x-1 bg-white/5 rounded-3xl p-1 text-sm font-medium">
                <button onclick="setFilter('all')" id="filter-all" class="filter-btn px-7 py-3 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-slate-900">Todas</button>
                <button onclick="setFilter('active')" id="filter-active" class="filter-btn px-7 py-3 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-slate-900">Pendentes</button>
                <button onclick="setFilter('completed')" id="filter-completed" class="filter-btn px-7 py-3 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-slate-900">Concluídas</button>
            </div>
            <span id="task-count" class="text-slate-400 text-sm font-medium">0 tarefas</span>
        </div>

        <!-- Task List -->
        <ul id="task-list" class="task-list space-y-3"></ul>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 text-center">
            <div class="text-6xl mb-6">📭</div>
            <h3 class="text-2xl font-medium text-slate-300">Nenhuma tarefa ainda</h3>
            <p class="text-slate-400 mt-2">Adicione sua primeira tarefa acima</p>
        </div>

        <div class="text-center text-xs text-slate-500 mt-16">
            Flow To-Do List • Design Moderno
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
